services:
  - type: web
    name: mpesa-pos-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: "3001"
    healthCheckPath: /health
    autoDeploy: true
